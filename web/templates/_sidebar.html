<!-- Боковая панель -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon"></span>
            <span class="logo-text">MV Stend</span>
        </div>
        <button class="burger-btn" id="burgerBtn" title="Свернуть/развернуть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a href="/" class="nav-item {{ 'active' if active_page == 'monitoring' else '' }}">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Мониторинг</span>
        </a>
        <a href="/tools" class="nav-item {{ 'active' if active_page == 'tools' else '' }}">
            <span class="nav-icon">🔧</span>
            <span class="nav-text">Инструменты</span>
        </a>
        <a href="/history" class="nav-item {{ 'active' if active_page == 'history' else '' }}">
            <span class="nav-icon">📈</span>
            <span class="nav-text">История</span>
        </a>
        <a href="/debug" class="nav-item {{ 'active' if active_page == 'debug' else '' }}">
            <span class="nav-icon">🔬</span>
            <span class="nav-text">Отладка</span>
        </a>
        <a href="/settings" class="nav-item {{ 'active' if active_page == 'settings' else '' }}">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Настройки</span>
        </a>
        <a href="/reports" class="nav-item {{ 'active' if active_page == 'reports' else '' }}">
            <span class="nav-icon">📋</span>
            <span class="nav-text">Отчёты</span>
        </a>
        {% if current_user and current_user.role == 'admin' %}
        <a href="/users" class="nav-item {{ 'active' if active_page == 'users' else '' }}" data-role="admin">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Пользователи</span>
        </a>
        {% endif %}
    </nav>

    <!-- Блок пользователя в сайдбаре -->
    <div class="sidebar-user" id="sidebarUser" style="display: none;">
        <div class="user-info">
            <span class="user-name" id="userName">—</span>
            <span class="user-role" id="userRole">—</span>
        </div>
        <a href="/auth/logout" class="btn-logout" title="Выйти">
            <span>🚪</span>
        </a>
    </div>
</aside>

<style>
.sidebar-user {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    margin: 16px;
    background: rgba(102, 126, 234, 0.1);
    border-radius: 8px;
    border: 1px solid rgba(102, 126, 234, 0.2);
}
.user-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
}
.user-name {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.user-role {
    font-size: 11px;
    color: #667eea;
    font-weight: 500;
}
.btn-logout {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: transparent;
    transition: background 0.2s;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
}
.btn-logout:hover {
    background: rgba(220, 38, 38, 0.1);
}
</style>
